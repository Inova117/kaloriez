# Landing estática de Kaloriez (separada de la app Expo).
# No necesita build: es un index.html autocontenido.
# En Netlify (UI): Publish directory = landing, Build command y Functions vacíos.
[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
