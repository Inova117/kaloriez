# Este sitio sirve la LANDING estática directamente desde la carpeta landing/.
# Va en la RAÍZ del repo a propósito: manda sobre los ajustes del UI de Netlify,
# así que aunque el UI tenga "expo export -p web" / "dist", esto gana y publica
# la landing. Es estática: no hay build.
[build]
  publish = "landing"
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
